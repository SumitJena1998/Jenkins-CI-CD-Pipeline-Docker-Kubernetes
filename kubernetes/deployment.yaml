apiVersion: apps/v1
kind: Deployment
metadata:
  name: nodeapp
  namespace: production
  labels:
    app: nodeapp
    version: "1.0"
    managed-by: jenkins
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nodeapp
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: nodeapp
        version: "1.0"
    spec:
      # Security Context
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001

      # Graceful termination
      terminationGracePeriodSeconds: 30

      containers:
        - name: nodeapp
          image: IMAGE_PLACEHOLDER   # Replaced by Jenkinsfile sed
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http

          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "8080"

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          # Liveness: restart if app is stuck
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3

          # Readiness: only send traffic when ready
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3

          # Security
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
